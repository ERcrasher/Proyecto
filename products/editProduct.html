<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>
</head>

<body>
    <h2>Ingrese el producto:</h2>
    <form id="agregar prod">
        <table class="default">
            <tr>
                <td>Código: </td>
                <td><input type="text" id="inputCode"> </td>
            </tr>
            <tr>
                <td>Nombre: </td>
                <td><input type="text" id="inputName"> </td>
            </tr>
            <tr>
                <td>Descripcion: </td>
                <td><input type="text" id="inputDesc"> </td>
            </tr>
            <tr>
                <td>Categoria: </td>
                <td><input type="text" id="inputCategory"> </td>
            </tr>
            <tr>
                <td>Existencia: </td>
                <td><input type="text" id="inputExist"> </td>
            </tr>

        </table>
        <input type="submit" id="login" value="enviar">
    </form>
</body>

</html>
